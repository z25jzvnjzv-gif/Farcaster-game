<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Crash Dodger</title>
    <!-- Farcaster Mini-App SDK -->
    <script src="https://unpkg.com"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: linear-gradient(to bottom, #1a0b2e, #07020d);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .menu-box {
            background: rgba(20, 10, 35, 0.9);
            border: 2px solid #8b5cf6;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            pointer-events: auto;
            width: 85%;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
            display: none;
        }
        .menu-box.active {
            display: block;
        }
        h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            color: #a78bfa;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .btn {
            background: linear-gradient(90deg, #ec4899, #8b5cf6);
            border: none;
            color: white;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 10px rgba(236, 72, 153, 0.3);
            text-transform: uppercase;
            transition: transform 0.1s ease;
        }
        .btn:active {
            transform: scale(0.98);
        }
        #scoreDisplay {
            position: absolute;
            top: 20px;
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.8);
            display: none;
        }
        #scoreDisplay.active {
            display: block;
        }
        .status-text {
            color: #10b981;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    
    <div id="uiLayer">
        <!-- Live Running Score Tracker -->
        <div id="scoreDisplay">0</div>

        <!-- Start Screen -->
        <div id="startMenu" class="menu-box active">
            <h1>Crypto Dodger</h1>
            <p>Tap to jump. Flap past the red market candles. Don't crash your portfolio!</p>
            <button class="btn" onclick="startGame()">Launch Game</button>
            <div id="userWelcome" class="status-text">Connecting to Farcaster...</div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverMenu" class="menu-box">
            <h1>Portfolio Wiped!</h1>
            <p>You survived <span id="finalScore" style="color:#fff; font-weight:bold;">0</span> market dips.</p>
            <button class="btn" onclick="submitAndRestart()">Submit Score & Replay</button>
            <div id="submitStatus" class="status-text"></div>
        </div>
    </div>
</div>

<script>
    // Initialize Farcaster Mini-App SDK
    let farcasterUser = null;
    
    if (window.farcaster && window.farcaster.FrameSDK) {
        window.farcaster.FrameSDK.initialize().then((context) => {
            farcasterUser = context?.user;
            if (farcasterUser) {
                document.getElementById('userWelcome').innerText = `Playing as: @${farcasterUser.username}`;
            }
        }).catch(err => console.error("Farcaster SDK init failed:", err));
    } else {
        document.getElementById('userWelcome').innerText = "Web Browser Mode (Demo)";
    }

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Dynamic Sizing for Mobile Feeds
    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Game variables
    let gameState = "START"; // START, PLAYING, GAMEOVER
    let score = 0;
    let frames = 0;

    // Physics constants
    const GRAVITY = 0.25;
    const JUMP_FORCE = -5.5;
    const CANDLE_SPEED = 2.5;
    const CANDLE_SPAWN_RATE = 100; // frames
    const GAP_SIZE = 160;

    // Coin Entity (The Player)
    const coin = {
        x: 60,
        y: 200,
        radius: 16,
        velocity: 0,
        draw: function() {
            // Gold Outline Glow
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#eab308";
            
            // Outer Gold Ring
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#eab308";
            ctx.fill();
            ctx.closePath();

            // Inner Light Gold Body
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius - 3, 0, Math.PI * 2);
            ctx.fillStyle = "#facc15";
            ctx.fill();
            ctx.closePath();

            // Bold "₿" Logo text center
            ctx.shadowBlur = 0; // Reset shadow for text
            ctx.fillStyle = "#78350f";
            ctx.font = "900 16px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("B", this.x, this.y);
        },
        update: function() {
            if (gameState !== "PLAYING") return;
            this.velocity += GRAVITY;
            this.y += this.velocity;

            // Bottom constraint
            if (this.y + this.radius >= canvas.height) {
                this.y = canvas.height - this.radius;
                endGame();
            }
            // Top constraint
            if (this.y - this.radius <= 0) {
                this.y = this.radius;
                this.velocity = 0;
            }
        },
        jump: function() {
            this.velocity = JUMP_FORCE;
        }
    };

    // Obstacles Container
    let candles = [];

    function spawnCandle() {
        const minHeight = 40;
        const maxHeight = canvas.height - GAP_SIZE - minHeight;
        const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
        
        candles.push({
            x: canvas.width,
            topHeight: topHeight,
            bottomY: topHeight + GAP_SIZE,
            width: 48,
            passed: false
        });
    }

    function drawCandles() {
        candles.forEach(c => {
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#ef4444";
            ctx.fillStyle = "#ef4444"; // Bearish Red Candlestick

            // Top Candle block
            ctx.fillRect(c.x, 0, c.width, c.topHeight);
            // Top Wick line
            ctx.fillRect(c.x + (c.width/2) - 2, c.topHeight, 4, 15);

            // Bottom Candle block
            ctx.fillRect(c.x, c.bottomY, c.width, canvas.height - c.bottomY);
            // Bottom Wick line
            ctx.fillRect(c.x + (c.width/2) - 2, c.bottomY - 15, 4, 15);
            
            ctx.shadowBlur = 0; // Clear shadow
        });
    }

    function updateCandles() {
        if (gameState !== "PLAYING") return;

        for (let i = candles.length - 1; i >= 0; i--) {
            candles[i].x -= CANDLE_SPEED;

            // Score point detection
            if (!candles[i].passed && candles[i].x + candles[i].width < coin.x) {
                score++;
                document.getElementById("scoreDisplay").innerText = score;
                candles[i].passed = true;
            }

            // Precise Box-to-Circle Collision Check
            if (checkCollision(coin, candles[i])) {
                endGame();
            }

            // Remove offscreen arrays
            if (candles[i].x + candles[i].width < 0) {
                candles.splice(i, 1);
            }
        }

        if (frames % CANDLE_SPAWN_RATE === 0) {
            spawnCandle();
        }
    }

    function checkCollision(circle, rect) {
        // Test top candle block
        let closestX1 = Math.max(rect.x, Math.min(circle.x, rect.x + rect.width));
        let closestY1 = Math.max(0, Math.min(circle.y, rect.topHeight));
        let distanceX1 = circle.x - closestX1;
        let distanceY1 = circle.y - closestY1;
        let distanceSquared1 = (distanceX1 * distanceX1) + (distanceY1 * distanceY1);

        // Test bottom candle block
        let closestX2 = Math.max(rect.x, Math.min(circle.x, rect.x + rect.width));
        let closestY2 = Math.max(rect.bottomY, Math.min(circle.y, canvas.height));
        let distanceX2 = circle.x - closestX2;
        let distanceY2 = circle.y - closestY2;
        let distanceSquared2 = (distanceX2 * distanceX2) + (distanceY2 * distanceY2);

        const radiusSquared = circle.radius * circle.radius;
        return (distanceSquared1 < radiusSquared || distanceSquared2 < radiusSquared);
    }

    // Input listeners (Tap to flap)
